<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1040"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4d9ff"/>
      <stop offset="0.5" stop-color="#9b87f5"/>
      <stop offset="1" stop-color="#7c6af7"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c6af7" stop-opacity="0"/>
      <stop offset="1" stop-color="#c4d9ff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle star dots -->
  <circle cx="80" cy="90" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="150" cy="60" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="420" cy="110" r="1.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="460" cy="70" r="1" fill="#ffffff" opacity="0.25"/>
  <circle cx="380" cy="420" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="100" cy="400" r="1" fill="#ffffff" opacity="0.25"/>
  <circle cx="55" cy="300" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="480" cy="330" r="1.5" fill="#ffffff" opacity="0.2"/>

  <!-- Contrail trails -->
  <path d="M 90 310 Q 180 270 270 235" stroke="url(#trail)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 110 330 Q 190 295 270 265" stroke="url(#trail)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Plane shadow/glow -->
  <g filter="url(#softglow)" opacity="0.5">
    <path d="M 270 235 L 390 185 L 400 195 L 310 235 L 355 255 L 340 268 L 280 255 L 258 268 L 245 258 Z" fill="#9b87f5"/>
  </g>

  <!-- Main airplane body — flying upper-right -->
  <g filter="url(#glow)" transform="rotate(-20, 310, 230)">
    <!-- Fuselage -->
    <ellipse cx="310" cy="225" rx="95" ry="18" fill="url(#plane)"/>
    <!-- Nose cone -->
    <path d="M 400 220 Q 430 225 400 230 Z" fill="#c4d9ff"/>
    <!-- Main wing -->
    <path d="M 300 225 L 265 290 L 230 285 L 290 225 Z" fill="url(#plane)" opacity="0.95"/>
    <path d="M 310 225 L 360 195 L 375 205 L 315 225 Z" fill="url(#plane)" opacity="0.85"/>
    <!-- Tail fin vertical -->
    <path d="M 225 222 L 215 190 L 235 195 L 235 222 Z" fill="#9b87f5"/>
    <!-- Tail stabilizer horizontal -->
    <path d="M 225 222 L 240 240 L 215 242 L 220 228 Z" fill="#9b87f5" opacity="0.8"/>
    <!-- Windows row -->
    <ellipse cx="360" cy="221" rx="5" ry="4" fill="#1a1040" opacity="0.6"/>
    <ellipse cx="345" cy="220" rx="5" ry="4" fill="#1a1040" opacity="0.6"/>
    <ellipse cx="330" cy="220" rx="5" ry="4" fill="#1a1040" opacity="0.6"/>
    <ellipse cx="315" cy="220" rx="4.5" ry="4" fill="#1a1040" opacity="0.6"/>
    <ellipse cx="300" cy="221" rx="4.5" ry="4" fill="#1a1040" opacity="0.6"/>
  </g>

  <!-- Text: TRIP -->
  <text x="256" y="365" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="900" letter-spacing="6" fill="white">TRIP</text>
  <!-- Text: VA — accent color -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="600" letter-spacing="10" fill="#9b87f5">LIVE</text>
</svg>

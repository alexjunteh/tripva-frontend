  <path d="M95 470 C255 380 385 390 540 305 C710 210 840 215 1080 95" fill="none" stroke="#c4d9ff" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
  <path d="M95 505 C275 408 430 415 590 330 C760 238 890 245 1095 150" fill="none" stroke="#7c6af7" stroke-width="2" stroke-linecap="round" opacity="0.24"/>

  <g transform="translate(82 76)" filter="url(#shadow)">

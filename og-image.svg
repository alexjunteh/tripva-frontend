  <g transform="translate(82 280)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="900" letter-spacing="-3" fill="#ffffff">Tripva</text>
    <text x="0" y="80" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800" letter-spacing="-1.4" fill="url(#brand)">Plan a trip in 30 seconds.</text>
    <text x="0" y="132" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="500" fill="#cbd5e1">AI builds the itinerary, hotels, budget, tickets,</text>
    <text x="0" y="168" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="500" fill="#cbd5e1">and live travel alerts.</text>

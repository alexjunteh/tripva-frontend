# Tripva visual-regression routes
# Format: <name>|<url>|<wait_ms>
#   name     — slug used for screenshot filename (no spaces)
#   url      — absolute URL to capture
#   wait_ms  — milliseconds to wait after navigation before screenshot (splash, streaming, map init, etc.)
#
# Lines starting with # are ignored. Blank lines ignored.
# Mobile (390x844) and desktop (1280x800) are both captured for every entry.

landing           | https://tripva.app/                                    | 1500
plan-empty        | https://tripva.app/plan                                 | 1500
mytrips-signin    | https://tripva.app/mytrips                              | 1500
trip-empty        | https://tripva.app/trip?id=none                         | 3500
trip-italy-demo   | https://tripva.app/italy-test.html                      | 3000

name: QA Browser Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qa/package-lock.json

      - name: Install Playwright
        run: |
          cd qa
          npm install --legacy-peer-deps
          npx playwright install --with-deps chromium

      - name: Run QA tests
        run: |
          cd qa
          node run-qa.js > qa-output.json 2>&1
          echo "=== QA RESULTS ==="
          cat qa-output.json

      - name: Parse QA results
        run: |
          cd qa
          node audit-report.js

      - name: Upload QA report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-results
          path: qa/qa-results.json
          retention-days: 7

      - name: Block deploy on QA failure
        if: failure()
        run: |
          echo "❌ QA FAILED — blocking deploy"
          exit 1

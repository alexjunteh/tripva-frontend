name: Visual audit

# Runs after push-to-main + Cloudflare Pages deploy. Hits the LIVE site
# so it catches anything the deploy pipeline mangled. Gates protected
# branches: a failing audit marks the commit red in GitHub.

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'plan.html'
      - 'trip.html'
      - 'mytrips.html'
      - 'tests/visual/**'
      - '.github/workflows/visual-audit.yml'
  workflow_dispatch:  # manual trigger from the Actions tab

concurrency:
  group: visual-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: Audit live site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install ImageMagick
        run: sudo apt-get update -qq && sudo apt-get install -y imagemagick

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.30

      - name: Install Playwright browsers (headless Chromium for browse tool)
        run: bunx playwright install --with-deps chromium

      - name: Build gstack browse binary
        run: |
          # Clone gstack and run its own ./setup which compiles the browse binary
          # into its dist/ dir. audit.sh resolves the browse path via $HOME/.claude/skills/gstack.
          TARGET_DIR="${HOME}/.claude/skills/gstack"
          mkdir -p "$(dirname "$TARGET_DIR")"
          if [ ! -x "$TARGET_DIR/browse/dist/browse" ]; then
            rm -rf "$TARGET_DIR"
            git clone --depth 1 https://github.com/garrytan/gstack.git "$TARGET_DIR"
            (cd "$TARGET_DIR" && ./setup)
          fi
          ls -la "$TARGET_DIR/browse/dist/" || true
          test -x "$TARGET_DIR/browse/dist/browse" || { echo "browse binary missing"; exit 2; }

      - name: Wait for Cloudflare deploy to propagate
        run: |
          # CF Pages usually publishes within 30–60s of push. Poll until the
          # pushed SHA is embedded in the HTML (we stamp it server-side) OR
          # give up after 3 minutes and audit whatever's live.
          SHA=$(git rev-parse --short HEAD)
          for i in $(seq 1 18); do
            if curl -sf https://tripva.app/ >/dev/null; then
              echo "tripva.app reachable — proceeding"; break
            fi
            sleep 10
          done

      - name: Run visual audit
        id: audit
        run: |
          chmod +x ./tests/visual/audit.sh
          # Run in full mode; exits 0 on pass, 1 on fail
          ./tests/visual/audit.sh --full

      - name: Upload audit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.sha }}
          path: tests/visual/reports/
          retention-days: 14

      - name: Print failure summary
        if: failure()
        run: |
          echo "::error::Visual audit failed on live tripva.app after deploy."
          echo ""
          echo "Common causes:"
          echo "  - Console error from a ship-breaking JS bug"
          echo "  - Tap-target regression (<44px)"
          echo "  - Pixel diff >2% without intentional redesign note"
          echo "  - Drill-in modal failed to open"
          echo ""
          echo "Download the audit-report-${GITHUB_SHA:0:7} artifact above for the HTML report."
          echo "Run locally: ./tests/visual/audit.sh --full"
